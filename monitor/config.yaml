# Job monitor search spec.
#
# Concrete searches are generated as the cross-product of (cities x role_templates x
# role_templates.search_terms). Each (template, city) pair produces N searches —
# one per search_term. The search name is `<template>_<city>`. Multiple terms
# under one template are merged before dedup, so the digest treats them as one
# bucket.
#
# Edit `cities`, `role_templates`, and `filters` to retune. Keep this YAML —
# `monitor/run.py` reads it at every run.

# Glassdoor auto-drops per-city for countries whose JobSpy `Country` enum
# tuple is only 2 elements (no Glassdoor TLD). Currently affects: Sweden,
# Denmark, Norway, Finland, Poland, Czech Republic, Portugal, Israel.
# See `_glassdoor_supported` in monitor/run.py.
cities:
  # ---- UK ----
  - name: london
    location: "London, United Kingdom"
    country_indeed: uk
  - name: edinburgh
    location: "Edinburgh, United Kingdom"
    country_indeed: uk
  - name: cambridge_uk
    location: "Cambridge, United Kingdom"
    country_indeed: uk
  - name: oxford
    location: "Oxford, United Kingdom"
    country_indeed: uk
  - name: bristol
    # HP, Graphcore, Toshiba have engineering presence here.
    location: "Bristol, United Kingdom"
    country_indeed: uk
  - name: manchester
    location: "Manchester, United Kingdom"
    country_indeed: uk

  # ---- Ireland ----
  - name: dublin
    location: "Dublin, Ireland"
    country_indeed: ireland

  # ---- Netherlands ----
  - name: amsterdam
    location: "Amsterdam, Netherlands"
    country_indeed: netherlands
  - name: rotterdam
    location: "Rotterdam, Netherlands"
    country_indeed: netherlands
  - name: eindhoven
    # ASML hub.
    location: "Eindhoven, Netherlands"
    country_indeed: netherlands

  # ---- DACH ----
  - name: berlin
    location: "Berlin, Germany"
    country_indeed: germany
  - name: munich
    location: "Munich, Germany"
    country_indeed: germany
  - name: zurich
    location: "Zurich, Switzerland"
    country_indeed: switzerland
  - name: vienna
    location: "Vienna, Austria"
    country_indeed: austria

  # ---- France / Iberia / Italy ----
  - name: paris
    location: "Paris, France"
    country_indeed: france
  - name: milan
    location: "Milan, Italy"
    country_indeed: italy
  - name: madrid
    location: "Madrid, Spain"
    country_indeed: spain
  - name: barcelona
    location: "Barcelona, Spain"
    country_indeed: spain
  - name: lisbon
    # Glassdoor auto-skipped (no .pt TLD).
    location: "Lisbon, Portugal"
    country_indeed: portugal

  # ---- CEE ----
  - name: warsaw
    # Glassdoor auto-skipped (no .pl TLD).
    location: "Warsaw, Poland"
    country_indeed: poland
  - name: prague
    # Glassdoor auto-skipped (no .cz TLD).
    location: "Prague, Czech Republic"
    country_indeed: "czech republic"

  # ---- Nordics ----  (Glassdoor auto-skipped for all four — no TLDs)
  - name: stockholm
    location: "Stockholm, Sweden"
    country_indeed: sweden
  - name: copenhagen
    location: "Copenhagen, Denmark"
    country_indeed: denmark
  - name: oslo
    location: "Oslo, Norway"
    country_indeed: norway
  - name: helsinki
    location: "Helsinki, Finland"
    country_indeed: finland

  # ---- Israel ----
  - name: tel_aviv
    # Glassdoor auto-skipped (no .il TLD). Bayt covers broader Middle
    # East for junior SDE so we don't add other ME cities here.
    location: "Tel Aviv, Israel"
    country_indeed: israel

# NOTE: Glassdoor was previously included but its location-resolution endpoint
# 400's on every "City, Country" string we tried, and Indeed already covers
# the same job surface. Re-add later only if we want to split JobSpy calls
# per-site (city-only string for Glassdoor, full string for Indeed/LinkedIn).
# Per-template config knobs:
#   sites: [list]              — which JobSpy scrapers to call
#   search_terms: [list]       — DEFAULT terms (used by sites without override)
#   site_search_terms:         — per-site override; LinkedIn gets ONE term
#                                because each LinkedIn call burns IP reputation
#                                fast; Indeed iterates all of search_terms because
#                                it matches description-text and benefits from variety.
#   sites_skip_in_ci: [list]   — sites to drop when GITHUB_ACTIONS / CI env is set
#                                (LinkedIn IPs from CI runners get blocked aggressively
#                                — leave LinkedIn for local runs where the user's home
#                                IP has clean reputation).
#   results_wanted: int        — how many to ask each site for
#   hours_old: int             — freshness window
#   job_type: fulltime/intern  — JobSpy filter
role_templates:
  - name: sde_junior
    sites: [indeed, linkedin, glassdoor, bayt]
    # bayt + glassdoor blanket-403 from GitHub Actions IP ranges (and
    # have produced 0 rows for every CI run since the monitor was set
    # up). My code fixes for both are necessary but not sufficient —
    # the WAF block is at the network edge, not in the response. Skip
    # them in CI; they still run locally where the user's home IP has
    # clean reputation.
    sites_skip_in_ci: [linkedin, glassdoor, bayt]
    search_terms:
      - "software engineer new grad"
      - "junior software engineer"
      - "graduate software engineer"
      - "early career software engineer"
      - "associate software engineer"
      - "graduate programme software"
      # Broader Indeed coverage — Indeed matches against the description
      # text, so additional phrasings widen recall on roles that were
      # tagged with non-standard titles. Cost is just more API calls
      # to the one source that actually works in CI; dedup at the URL
      # level handles any overlap.
      - "software developer graduate"
      - "graduate software developer"
      - "entry level software engineer"
      - "software engineer graduate scheme"
      - "graduate sde"
      - "swe new grad"
    site_search_terms:
      linkedin:
        - "graduate software engineer"
      glassdoor:
        - "graduate software engineer"
      bayt:
        - "software engineer"
    results_wanted: 50
    # 168h = one week. The DB de-dupes by URL across runs so a wider
    # window costs ingest time, not duplicate rows.
    hours_old: 168
    job_type: fulltime

  - name: mle_junior
    sites: [indeed, linkedin, glassdoor, bayt]
    sites_skip_in_ci: [linkedin, glassdoor, bayt]
    search_terms:
      - "machine learning engineer new grad"
      - "junior machine learning engineer"
      - "graduate machine learning engineer"
      - "ai engineer new grad"
      - "graduate machine learning"
      # Extra Indeed coverage — same rationale as sde_junior. ML titles
      # are particularly varied at EMEA employers (some still call the
      # role "data scientist" even when it's MLE-shaped); broaden the
      # net to catch them.
      - "junior ai engineer"
      - "graduate ai engineer"
      - "early career machine learning"
      - "graduate data scientist machine learning"
      - "entry level machine learning engineer"
    site_search_terms:
      linkedin:
        - "graduate machine learning engineer"
      glassdoor:
        - "graduate machine learning engineer"
      bayt:
        - "machine learning engineer"
    results_wanted: 30
    hours_old: 168
    job_type: fulltime

  - name: applied_scientist
    # "Research Scientist" titles are explicitly excluded — they're
    # PhD+ track at every employer in our allowlist, so they're not
    # appropriate for this user. We still search the `applied scientist`
    # term because Amazon / Microsoft use that label for entry-level
    # MLE roles.
    sites: [indeed, linkedin, glassdoor]
    sites_skip_in_ci: [linkedin, glassdoor]
    search_terms:
      - "applied scientist"
      # Broader Indeed coverage — applied-science track titles vary
      # by employer ("applied scientist II" / "associate applied
      # scientist" at Amazon; "Microsoft applied scientist" / etc).
      # The seniority tokens are still gated by `exclude_titles`, so
      # over-broad matches drop in apply_filters.
      - "associate applied scientist"
      - "applied scientist new grad"
      - "applied scientist graduate"
    site_search_terms:
      linkedin:
        - "applied scientist"
      glassdoor:
        - "applied scientist"
    results_wanted: 30
    hours_old: 168
    job_type: fulltime

  - name: quant_junior
    # Quant is a small but high-signal category for the EMEA hubs we
    # track (London especially). Keep results_wanted low — these roles
    # are concentrated, not distributed. Bayt is dropped here — quant is
    # not a Middle-East category in our experience.
    sites: [indeed, linkedin, glassdoor]
    sites_skip_in_ci: [linkedin, glassdoor]
    search_terms:
      - "graduate trader"
      - "quantitative researcher new grad"
      - "graduate quantitative"
      - "junior quant developer"
      # Broader quant coverage — common phrasings used by Jane Street,
      # Citadel, Optiver, IMC, JPM Quant rotation programmes. These
      # don't expand the role surface; they catch the same roles
      # phrased differently.
      - "quantitative developer graduate"
      - "graduate quant trader"
      - "junior quantitative researcher"
      - "quant graduate"
    site_search_terms:
      linkedin:
        - "graduate quantitative"
      glassdoor:
        - "graduate quantitative"
    results_wanted: 20
    hours_old: 168
    job_type: fulltime

filters:
  # Case-insensitive substring match on a SPACE-PADDED lowercased title (the
  # title is wrapped in leading/trailing spaces before matching). Tokens are
  # lowercased but NOT stripped, so a leading/trailing space in the YAML
  # token acts as a cheap word-boundary — e.g. ` sr ` matches "Foo Sr Bar"
  # but not "Hawaii"/"Israeli". Substring tokens without spaces (`senior`,
  # `staff`) still work like before.
  exclude_titles:
    - director
    - vp
    - head of
    - manager
    - architect
    # "Sr" variants — Indeed UK/US frequently uses "Sr." or "Sr "
    - "sr."
    - " sr "
    - "sr,"
    - " ii"
    - " iii"
    - "level 5"
    - "level 6"
    - "l5"
    - "l6"
    - "5+ years"
    - "7+ years"
    - "10+ years"
    # Note on "senior" / "staff" / "principal" / "lead": previously
    # excluded globally, lifted so the senior_sde slice can surface
    # senior IC roles. Existing junior slices keep them in their local
    # `title_keywords_none` block; emea-entry-level / JOBS.md are happy
    # to surface senior roles per user direction.
    # Research Scientist tracks are PhD+ at every employer we monitor —
    # explicitly drop them. Note the trailing space so "Research Scientist
    # II" / "Research Scientist, Foo" both match while a hypothetical
    # "Junior Research Scientist Assistant" still drops too (substring).
    - "research scientist"
    # "Research Software Engineer" titles are PhD-track at Google
    # Research / Microsoft Research / etc — keep excluded.
    - "research software"
    # NOTE: "research engineer" was previously here but has been LIFTED
    # globally so that Anthropic / Cohere / Mistral RE roles (some of
    # which are accessible to strong master's candidates) can surface.
    # Per-slice handling: emea_junior_mle / na_junior_mle add
    # "research engineer" to their title_keywords_any so RE roles show
    # up there; the SDE / quant slices key on different tokens and
    # therefore won't match RE titles by accident.

  # POSITIVE filter — keep only titles that contain AT LEAST ONE of these
  # tokens (case-insensitive substring on the same space-padded title).
  # Drops cross-domain Indeed matches (e.g. a "Sales Specialist" returned
  # for an SDE search because Indeed matches against the description too).
  # Set empty / remove the key to disable.
  include_title_keywords:
    - software
    - engineer
    - developer
    - scientist
    - sde
    - swe
    - "machine learning"
    - " ml "
    - "applied scientist"
    - "data scientist"
    - "ai engineer"
    - "ml engineer"
    # Infra-adjacent SDE titles. "platform engineer" and "infrastructure
    # engineer" are tightly scoped. "systems engineer" is broader — it
    # catches "ML Systems Engineer" / "Distributed Systems Engineer"
    # (the wanted surface) but also industrial/electrical/aerospace
    # "Systems Engineer" titles; the company allowlist downstream
    # filters most of those out, and the SDE slice in slices.yaml
    # opts into these tokens explicitly.
    - "platform engineer"
    - "infrastructure engineer"
    - "systems engineer"
    # "research engineer" — allowed globally (see exclude_titles note
    # above). Anthropic / Cohere / Mistral RE roles surface in
    # emea_junior_mle / na_junior_mle slices.
    - "research engineer"
    # ---- Data analyst / analytics surface ----
    # Bare "analyst" is too noisy (matches business/financial/HR analyst)
    # so we use the multi-word phrasings. "analytics engineer" / "data
    # analyst" cover the dbt-shaped + dashboard-shaped data roles.
    - "data analyst"
    - "analytics engineer"
    - "business intelligence"
    # ---- 算法岗 / Algorithm engineering surface ----
    # "algorithm" catches bare "Algorithm Engineer" / "Algorithm
    # Developer" titles. Search / recommendation / CV / NLP roles
    # already pass via "engineer", but listing them keeps intent clear
    # and rescues a few non-"engineer"-suffixed titles like
    # "Computer Vision Scientist" or "NLP Researcher".
    - "algorithm"
    - "computer vision"
    - "nlp"
    - "recommendation"
    # ---- DevOps / SRE surface ----
    # "devops" catches bare DevOps titles without "engineer". " sre " has
    # leading/trailing spaces because "sre" is short and would otherwise
    # match unrelated tokens like "stress" — the title is space-padded
    # before matching, so this gives us a word boundary.
    - "devops"
    - " sre "
    - "site reliability"

  # How `include_companies` is applied:
  #   enforce — drop any row whose company doesn't match a token on the list.
  #             The matching is word-boundary on a suffix-stripped form, so
  #             "Google" matches "Google", "Google LLC", "Google Cloud Spain"
  #             but does NOT match "Googleable Ltd". Use synonym lists for
  #             rebrands/abbreviations (e.g. [twitter, x corp]).
  #   off     — ignore the allowlist entirely; rely on title + min-desc
  #             filters only.
  include_companies_mode: "enforce"

  # Allowlist of large tech / scaleup / consulting / finance companies whose
  # roles we want to see. Synonyms can be listed as an inner list — any hit
