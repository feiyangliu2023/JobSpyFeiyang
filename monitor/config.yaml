# Job monitor search spec.
#
# Concrete searches are generated as the cross-product of (cities x role_templates x
# role_templates.search_terms). Each (template, city) pair produces N searches —
# one per search_term. The search name is `<template>_<city>`. Multiple terms
# under one template are merged before dedup, so the digest treats them as one
# bucket.
#
# Edit `cities`, `role_templates`, and `filters` to retune. Keep this YAML —
# `monitor/run.py` reads it at every run.

cities:
  - name: london
    location: "London, United Kingdom"
    country_indeed: uk
  - name: dublin
    location: "Dublin, Ireland"
    country_indeed: ireland
  - name: amsterdam
    location: "Amsterdam, Netherlands"
    country_indeed: netherlands
  - name: berlin
    location: "Berlin, Germany"
    country_indeed: germany
  - name: munich
    location: "Munich, Germany"
    country_indeed: germany
  - name: zurich
    location: "Zurich, Switzerland"
    country_indeed: switzerland
  - name: paris
    location: "Paris, France"
    country_indeed: france
  - name: stockholm
    location: "Stockholm, Sweden"
    country_indeed: sweden

# NOTE: Glassdoor was previously included but its location-resolution endpoint
# 400's on every "City, Country" string we tried, and Indeed already covers
# the same job surface. Re-add later only if we want to split JobSpy calls
# per-site (city-only string for Glassdoor, full string for Indeed/LinkedIn).
role_templates:
  - name: sde_junior
    search_terms:
      - "software engineer new grad"
      - "junior software engineer"
      - "graduate software engineer"
      - "early career software engineer"
    sites: [linkedin, indeed]
    results_wanted: 50
    hours_old: 72
    job_type: fulltime

  - name: mle_junior
    search_terms:
      - "machine learning engineer new grad"
      - "junior machine learning engineer"
      - "graduate machine learning engineer"
      - "ai engineer new grad"
    sites: [linkedin, indeed]
    results_wanted: 30
    hours_old: 72
    job_type: fulltime

  - name: applied_scientist
    search_terms:
      - "applied scientist"
    sites: [linkedin, indeed]
    results_wanted: 30
    hours_old: 72
    job_type: fulltime

filters:
  # Case-insensitive substring match on a SPACE-PADDED lowercased title (the
  # title is wrapped in leading/trailing spaces before matching). Tokens are
  # lowercased but NOT stripped, so a leading/trailing space in the YAML
  # token acts as a cheap word-boundary — e.g. ` sr ` matches "Foo Sr Bar"
  # but not "Hawaii"/"Israeli". Substring tokens without spaces (`senior`,
  # `staff`) still work like before.
  exclude_titles:
    - senior
    - staff
    - principal
    - director
    - vp
    - head of
    - lead
    - manager
    - architect
    # "Sr" variants — Indeed UK/US frequently uses "Sr." or "Sr "
    - "sr."
    - " sr "
    - "sr,"
    - " ii"
    - " iii"
    - "level 5"
    - "level 6"
    - "l5"
    - "l6"
    - "5+ years"
    - "7+ years"
    - "10+ years"

  # POSITIVE filter — keep only titles that contain AT LEAST ONE of these
  # tokens (case-insensitive substring on the same space-padded title).
  # Drops cross-domain Indeed matches (e.g. a "Sales Specialist" returned
  # for an SDE search because Indeed matches against the description too).
  # Set empty / remove the key to disable.
  include_title_keywords:
    - software
    - engineer
    - developer
    - scientist
    - sde
    - swe
    - "machine learning"
    - " ml "
    - "applied scientist"
    - "research scientist"
    - "data scientist"
    - "ai engineer"
    - "ml engineer"

  # How `include_companies` is applied:
  #   enforce — drop any row whose company doesn't match a token on the list.
  #             The matching is word-boundary on a suffix-stripped form, so
  #             "Google" matches "Google", "Google LLC", "Google Cloud Spain"
  #             but does NOT match "Googleable Ltd". Use synonym lists for
  #             rebrands/abbreviations (e.g. [twitter, x corp]).
  #   off     — ignore the allowlist entirely; rely on title + min-desc
  #             filters only.
  include_companies_mode: "enforce"

  # Allowlist of large tech / scaleup / consulting / finance companies whose
  # roles we want to see. Synonyms can be listed as an inner list — any hit
  # counts as a match. Tokens shorter than ~3 characters are unsafe (too
  # many false positives even with word boundaries) — prefer full names or
  # qualified phrases (e.g. "ing bank" not "ing"). Aggressively broadened
  # to err on the side of including more rather than missing real postings.
