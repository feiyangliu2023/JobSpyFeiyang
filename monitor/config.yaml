# External (non-JobSpy) job sources. Each source is mapped onto our
# jobs.db schema by code in monitor/external/ and goes through the same
# `filters` block above — `skip_filters` lets a curated source opt out
# of individual filter blocks.
#
# Region is auto-classified per listing from its location string (so a
# London Cohere posting in a "US-centric" repo still ends up in our
# EMEA section). `allowed_regions` lets a source ingest only certain
# regions — e.g. drop APAC postings entirely.
#
# Supported types:
#   - simplify_newgrad → SimplifyJobs/New-Grad-Positions listings.json
#   - simplify_intern  → SimplifyJobs/Summer2026-Internships listings.json
#   - direct           → per-company careers-page scraper, picks up the
#                        `module:` field as monitor/external/direct/<module>.py.
#                        See monitor/external/direct/README.md for the
#                        Greenhouse / Ashby pattern and the cheat sheet
#                        for adding the next tier-1 company.
external_sources:
  - name: simplify_newgrad
    type: simplify_newgrad
    # `url` defaults to the type's preset; override only if you fork.
    # Auto-classify region by location; ingest both EMEA + NA, drop APAC.
    allowed_regions: [emea, north_america]
    skip_filters:
      # listings.json has no description — skip or every row drops.
      # We deliberately do NOT skip `include_companies` here: the raw
      # SimplifyJobs feeds carry ~2k active rows each (mostly NA), and
      # without the allowlist gate that produces a >2,000-row JOBS.md
      # full of companies the user wouldn't apply to. The allowlist in
      # `filters.include_companies` is broad enough that the curated
      # FAANG/AI-lab/quant/scaleup set still surfaces; obscure startups
      # drop out instead of drowning the table.
      - min_description_chars

  - name: simplify_intern
    type: simplify_intern
    allowed_regions: [emea, north_america]
    skip_filters:
      - min_description_chars

  # vanshb03/Summer2026-Internships is a SimplifyJobs-schema fork with
  # partially-overlapping but not-identical coverage of the same upstream
  # space. Same dispatch path (`type: simplify_intern`), explicit URL
  # override. The signature-based dedup in render_md.py collapses any
  # role that appears in both this feed and SimplifyJobs's canonical
  # feed; SimplifyJobs wins the tie because it ranks higher in
  # `_SOURCE_PRIORITY`. Worth carrying for the ~10-20% non-overlapping
  # postings vanshb03 surfaces that the canonical repo missed.
  - name: vanshb03_summer2026
    type: simplify_intern
    url: "https://raw.githubusercontent.com/vanshb03/Summer2026-Internships/dev/.github/scripts/listings.json"
    allowed_regions: [emea, north_america]
    skip_filters:
      - min_description_chars

  # ---- Direct careers-page scrapers (tier-1 targets) ----
  #
  # One HTTP request per company per run; refreshes within hours of a
  # new posting going live instead of waiting for SimplifyJobs's
  # curation lag. Dedup at render time prefers `direct:*` rows over
  # simplify_* over JobSpy (see _SOURCE_PRIORITY in render_md.py).
  #
  # `min_description_chars` is skipped per-source because:
  #   - Greenhouse's `/jobs` endpoint omits descriptions by default
  #     (would need `?content=true` and a much larger response).
  #   - Ashby's `descriptionPlain` IS returned, but skipping the gate
  #     keeps behaviour uniform across direct scrapers.
  - name: direct_anthropic
    type: direct
    module: anthropic
    allowed_regions: [emea, north_america]
    skip_filters:
      - min_description_chars

  - name: direct_openai
    type: direct
    module: openai
    allowed_regions: [emea, north_america]
    skip_filters:
      - min_description_chars

  # DeepMind is on the allowlist but Google Careers can't be scraped
  # without a headless browser, so there's NO `direct_deepmind` entry
  # here on purpose — see `monitor/external/direct/deepmind.py` for the
  # rationale + the two working fallback channels (SimplifyJobs + JobSpy
  # with the "google deepmind" allowlist synonym). Registering a no-op
  # source would trip the SILENT health flag on every run and push a
  # noise ntfy alert; leaving it unregistered keeps the report clean.
