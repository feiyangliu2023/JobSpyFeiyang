# Slice definitions consumed by monitor/render_md.py:render_slices.
#
# Each slice produces ONE markdown file in the repo root with this layout:
#
#   # {title}
#   [Last updated, totals, ToC]
#   ---
#   ## New in last 24h    (first_seen >= now-24h)
#   ## New in last 7 days (now-7d <= first_seen < now-24h)
#   ## All active
#     ### FAANG+ & AI Labs / Quant & Finance / Other
#
# Slices draw from the BROADER pool — every row that passes the global
# title/desc/min_description filters from monitor/config.yaml, but with
# the `include_companies` allowlist dropped. So a London Klarna or
# Berlin Vinted SDE role surfaces here even though those companies
# aren't on JOBS.md's allowlist. Each slice's own `filters` block then
# narrows that pool further by region / title keywords / kind.
# (JOBS.md continues to use the curated allowlist-gated set.)
#
# Filter fields (all optional — omit to disable the gate):
#   regions: [emea, north_america]   — row.region must be in this set
#   title_keywords_any: [...]         — title must contain at least one (substring)
#   title_keywords_none: [...]        — title may not contain any (substring)
#   kinds: [newgrad, intern]          — uses render_md._classify_intern_or_newgrad
#
# `index_label` is the short link text used by INDEX.md — defaults to
# the slice's title. Slices are grouped in INDEX.md by their primary
# `regions` entry; order within a region preserves the order here.
#
# Sort: every section is first_seen DESC. No score-based sort.

slices:
  # ---- SDE slices ----
  # title_keywords_any opts into the SDE-shaped surface, including the
  # infra-adjacent titles ("platform engineer", "infrastructure engineer",
  # "systems engineer") added to the global include in config.yaml. The
  # global include is a gate, not a router — each slice still has to
  # name the tokens it wants. Without these here, infra titles would
  # only show up in JOBS.md, not in the dedicated SDE view.
  - name: emea_junior_sde
    filename: emea-junior-sde.md
    title: "EMEA Junior SDE Roles"
    index_label: "Junior SDE"
    filters:
      regions: [emea]
      title_keywords_any:
        - software engineer
        - software developer
        - backend
        - sde
        - swe
        - platform engineer
        - infrastructure engineer
        - systems engineer
      title_keywords_none:
        - senior
        - staff
        - lead
        - principal
      kinds: [newgrad, intern]

  # ---- MLE / Applied Scientist slices ----
  # "research engineer" is in title_keywords_any here even though the
  # token is *also* globally allowed (see config.yaml: it was removed
  # from exclude_titles to surface Anthropic / Cohere / Mistral RE roles
  # accessible to strong master's candidates). The SDE / quant slices
  # don't match RE titles because their title_keywords_any names different
  # tokens — so RE roles land here and in JOBS.md only.
  - name: emea_junior_mle
    filename: emea-junior-mle.md
    title: "EMEA Junior ML Engineer / Applied Scientist Roles"
    index_label: "Junior MLE / Applied Scientist"
    filters:
      regions: [emea]
      title_keywords_any:
        - machine learning
        - ml engineer
        - applied scientist
        - ai engineer
        - data scientist
        - research engineer
      title_keywords_none:
        - senior
        - staff
        - lead
      kinds: [newgrad, intern]

  - name: na_junior_sde
    filename: na-junior-sde.md
    title: "North America Junior SDE Roles"
    index_label: "Junior SDE"
    filters:
      regions: [north_america]
      title_keywords_any:
        - software engineer
        - software developer
        - backend
        - sde
        - swe
        - platform engineer
        - infrastructure engineer
        - systems engineer
      title_keywords_none:
        - senior
        - staff
        - lead
        - principal
      kinds: [newgrad, intern]

  - name: na_junior_mle
    filename: na-junior-mle.md
    title: "North America Junior ML Engineer / Applied Scientist Roles"
    index_label: "Junior MLE / Applied Scientist"
    filters:
      regions: [north_america]
      title_keywords_any:
        - machine learning
        - ml engineer
        - applied scientist
        - ai engineer
        - data scientist
        - research engineer
      title_keywords_none:
        - senior
        - staff
        - lead
      kinds: [newgrad, intern]

  # ---- Internship slices ----
  # title_keywords_any is intentionally absent. The active-rows pool that
  # feeds slices has already been gated by the global include_title_keywords
  # and min_description_chars filters in config.yaml, so we get a curated
  # tech-shaped surface here without a slice-local title positive list.
  # Dropping it widens the net to e.g. "summer analyst", "graduate
  # intern", non-English intern titles, etc. title_keywords_none stays
  # on as a safety net for the rare senior-prefixed intern title.
  - name: emea_intern_only
    filename: emea-internships.md
    title: "EMEA Internships"
    index_label: "Internships"
    filters:
      regions: [emea]
      title_keywords_none:
        - senior
        - staff
        - lead
        - principal
      kinds: [intern]

  - name: na_intern_only
    filename: na-internships.md
    title: "North America Internships"
    index_label: "Internships"
    filters:
      regions: [north_america]
      title_keywords_none:
        - senior
        - staff
        - lead
        - principal
      kinds: [intern]

  - name: emea_quant
    filename: emea-quant.md
    title: "EMEA Quant & Trading Roles"
    index_label: "Quant & Finance"
    filters:
      regions: [emea]
      title_keywords_any:
        - quant
        - quantitative
        - trader
        - trading
      title_keywords_none:
        - senior
        - staff
        - lead
        - principal
      kinds: [newgrad, intern]

  - name: na_quant
    filename: na-quant.md
    title: "North America Quant & Trading Roles"
    index_label: "Quant & Finance"
    filters:
      regions: [north_america]
      title_keywords_any:
        - quant
        - quantitative
        - trader
        - trading
      title_keywords_none:
        - senior
        - staff
        - lead
        - principal
      kinds: [newgrad, intern]

  # ---- Data analyst slices (all seniority) ----
  # Distinct from the MLE / data scientist slice — these are dbt-shaped
  # / dashboard-shaped roles, not modelling-shaped. No seniority filter
  # per user direction: junior and senior data-analyst roles both surface.
  - name: emea_data_analyst
    filename: emea-data-analyst.md
    title: "EMEA Data Analyst Roles"
    index_label: "Data Analyst"
    filters:
      regions: [emea]
      title_keywords_any:
        - data analyst
        - analytics engineer
        - business intelligence
        - bi developer
        - bi engineer
        - data analytics

  - name: na_data_analyst
    filename: na-data-analyst.md
    title: "North America Data Analyst Roles"
    index_label: "Data Analyst"
    filters:
      regions: [north_america]
      title_keywords_any:
        - data analyst
        - analytics engineer
        - business intelligence
        - bi developer
        - bi engineer
        - data analytics

  # ---- 算法岗 / Algorithm slices (all seniority) ----
  # Algorithm-shaped roles. At big tech (Meta / Google / Amazon / MSR /
  # ByteDance / TikTok) what zh-CN industry usage calls 算法岗 surfaces
  # under three primary titles — "Research Scientist", "Machine Learning
  # Engineer", "Applied Scientist" — alongside the more specialised
  # search / ranking / recommendation / CV / NLP / "algorithm engineer"
  # phrasings. We include both buckets here. This DELIBERATELY overlaps
  # the MLE slice (which also matches ml engineer / applied scientist):
  # the algorithm view is the 算法岗 reader's primary entry point, so
  # the recall has to cover the actual big-tech title surface, not just
  # roles whose title literally contains "algorithm".
  - name: emea_algorithm
    filename: emea-algorithm.md
    title: "EMEA Algorithm Engineer Roles (算法岗)"
    index_label: "Algorithm (算法岗)"
    filters:
      regions: [emea]
      title_keywords_any:
        - research scientist
        - machine learning engineer
        - applied scientist
        - algorithm
        - search engineer
        - search scientist
        - ranking engineer
        - recommendation
        - computer vision
        - nlp engineer
        - nlp scientist

  - name: na_algorithm
    filename: na-algorithm.md
    title: "North America Algorithm Engineer Roles (算法岗)"
    index_label: "Algorithm (算法岗)"
    filters:
      regions: [north_america]
      title_keywords_any:
        - research scientist
        - machine learning engineer
        - applied scientist
        - algorithm
        - search engineer
        - search scientist
        - ranking engineer
        - recommendation
        - computer vision
        - nlp engineer
        - nlp scientist

  # ---- Solutions / Customer / DevOps slices (all seniority) ----
  # Combined slice covering the user's "售前 / 售后 / devops" framing:
  # pre-sales (solutions / sales engineer), post-sales (customer engineer /
  # support / implementation), and operations (devops / sre / platform).
  # Kept as one slice rather than three since the user phrased them
  # together and the audience tends to view them as a single career lane.
  - name: emea_solutions_devops
    filename: emea-solutions-devops.md
    title: "EMEA Solutions / Customer / DevOps Roles"
    index_label: "Solutions / Customer / DevOps"
    filters:
      regions: [emea]
      title_keywords_any:
        - solutions engineer
        - sales engineer
        - pre-sales
        - presales
        - customer engineer
        - customer success
        - support engineer
        - implementation engineer
        - technical account
        - field engineer
        - devops
        - " sre "
        - site reliability

  - name: na_solutions_devops
    filename: na-solutions-devops.md
    title: "North America Solutions / Customer / DevOps Roles"
    index_label: "Solutions / Customer / DevOps"
    filters:
      regions: [north_america]
      title_keywords_any:
        - solutions engineer
        - sales engineer
        - pre-sales
        - presales
        - customer engineer
        - customer success
        - support engineer
        - implementation engineer
        - technical account
        - field engineer
        - devops
        - " sre "
        - site reliability

  # ---- Senior SDE slices ----
  # Specifically the senior IC SDE track. We list seniority-prefixed
  # phrasings as multi-word tokens so a "Senior Software Engineer" matches
  # but "Senior Data Scientist" does NOT (different role family — would
  # land in a hypothetical senior MLE slice instead). Note that "Sr." /
  # "II" / "L5" variants are STILL globally excluded by config.yaml —
  # only "senior", "staff", "principal", "lead" were lifted; the Sr./II/L5
  # signals stay excluded since updating every junior slice to also gate
  # them would be a bigger churn. Most FAANG / AI-lab senior titles use
  # "Senior" anyway, so coverage stays high.
  - name: emea_senior_sde
    filename: emea-senior-sde.md
    title: "EMEA Senior SDE Roles"
    index_label: "Senior SDE"
    filters:
      regions: [emea]
      title_keywords_any:
        - senior software engineer
        - senior software developer
        - senior backend
        - senior frontend
        - senior full stack
        - senior full-stack
        - senior fullstack
        - senior sde
        - senior swe
        - senior platform engineer
        - senior infrastructure engineer
        - senior systems engineer
        - staff software engineer
        - staff engineer
        - principal software engineer
        - principal engineer
        - lead software engineer
        - lead engineer

  - name: na_senior_sde
    filename: na-senior-sde.md
    title: "North America Senior SDE Roles"
    index_label: "Senior SDE"
    filters:
      regions: [north_america]
      title_keywords_any:
        - senior software engineer
        - senior software developer
        - senior backend
        - senior frontend
        - senior full stack
        - senior full-stack
        - senior fullstack
        - senior sde
        - senior swe
        - senior platform engineer
        - senior infrastructure engineer
        - senior systems engineer
        - staff software engineer
        - staff engineer
        - principal software engineer
        - principal engineer
        - lead software engineer
        - lead engineer
